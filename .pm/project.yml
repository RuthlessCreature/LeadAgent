requirements:
  - id: REQ-COMPLIANCE
    title: Keep lead acquisition compliant
    status: in_progress
    priority: high
    summary: Product now supports owned, first-party, first-party social, public, and licensed sources, persists local owned-social connector state, and explicitly excludes leaked or breached data and social profile scraping.
  - id: REQ-RUNTIME
    title: Make FastAPI the primary runtime
    status: done
    priority: high
    summary: Startup path and frontend now target the FastAPI product app.
  - id: REQ-COMMERCIAL-UX
    title: Present the app as a saleable product
    status: done
    priority: high
    summary: The frontend, docs, and dashboard were reframed around commercial lead operations rather than scraping experiments.
progress:
  summary: 15 done, 3 in progress, 2 planned, 2 blocked.
  counts:
    planned: 19
    doing: 3
    done: 15
    blocked: 2
blockers:
  - Arbitrary-product automation is still unproven because the system does not yet convert product input into buyer hypotheses and discovery plans without operator help.
  - Live validation with a real customer-owned dataset is still pending and inferred as the next proof point.
  - Social connectors are still local file-backed and mocked at the integration edge; real OAuth, webhook verification, and database-backed persistence are not implemented yet.
next_actions:
  - Implement the DeepSeek V4 gateway first: env-driven models, `deepseek-v4-flash` default, report model routing, JSON parsing tests, and old-alias warnings.
  - Add the Find Goods supplier sourcing data model, API surface, and frontend page, starting with a mock/permitted 1688 connector before real credentials are available.
  - Add person-level evidence requirements for real customer discovery so "real people" are only emitted with source URL, source type, and verification confidence.
  - Add a `product -> buyer hypotheses -> query plan -> source plan` strategy layer so public-web discovery can be evaluated from product input instead of hand-authored scenario terms.
  - Benchmark at least 20 unrelated verticals and measure direct-company-hit rate versus directories before making broader generalization claims.
  - Replace the local persisted social store with database-backed tables and encrypted token storage.
  - Implement a real LinkedIn Lead Sync OAuth and webhook connector on top of the new connector catalog and persisted state model.
  - Implement a real Meta lead-ads connector after the LinkedIn connector path is working.
  - Increase named-person coverage beyond the current high-confidence public-site matches by expanding team-page, staff-directory, and role-line heuristics without falling back to social-platform scraping.
  - Add official-directory and accreditation-source ingestion for institution-heavy scenarios because quick public-site benchmarks across five dealer/manufacturer use cases still produced very low named-contact yield.
  - Tighten the remaining `Unknown` and `North America` country assignments by handling toll-free NANP numbers, no-phone rows, and a few unresolved country heuristics.
  - Expand the scenario-file benchmark flow with reusable geography presets so vertical discovery can be reused beyond Hajj/Umrah without editing source.
  - Add per-language blocklists and ranking tweaks so multilingual discovery can suppress low-signal directories and blog results more aggressively.
  - Add first CRM connectors for HubSpot and Salesforce.
  - Move legacy scraping-first code behind an explicit experimental flag.
